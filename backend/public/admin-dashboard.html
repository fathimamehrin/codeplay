<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet" href="/css/admin-dashboard.css">

</head>

<body>

<h1>Admin Dashboard</h1>

<div class="cards">

<div class="card">
Total Users
<h2 id="totalUsers">0</h2>
</div>

</div>


<h2>Users</h2>

<table>

<thead>
<tr>
<table border="1">
  <thead>
    <tr>
      <th>Username</th>
      <th>Email</th>
      <th>Level</th>
      <th>Points</th>
      <th>HTML</th>
      <th>CSS</th>
      <th>JS</th>
      <th>CSS Unlocked</th>
      <th>JS Unlocked</th>

      <th>Action</th>
    </tr>
  </thead>

  <tbody id="userTable">
  </tbody>
</table>
</tr>
</thead>

<tbody id="userTable">

</tbody>

</table>

<h3>Add Lesson</h3>
<form id="lessonForm">
  <select name="course" required>
    <option value="">Select Course</option>
    <option value="HTML">HTML</option>
    <option value="CSS">CSS</option>
    <option value="JS">JS</option>
  </select>
  <input type="text" name="title" placeholder="Lesson Title" required>
  <textarea name="content" placeholder="Lesson Content" required></textarea>
  <input type="number" name="points" placeholder="Points" value="0">
  <button type="submit">Add Lesson</button>
</form>

<h3>Add Game</h3>
<form id="gameForm">
  <select name="course" required>
    <option value="">Select Course</option>
    <option value="HTML">HTML</option>
    <option value="CSS">CSS</option>
    <option value="JS">JS</option>
  </select>
  <input type="text" name="title" placeholder="Game Title" required>
  <select name="type" required>
    <option value="">Select Type</option>
    <option value="quiz">Quiz</option>
    <option value="puzzle">Puzzle</option>
  </select>
  <input type="number" name="points" placeholder="Points" value="0">
  <button type="submit">Add Game</button>
</form>




<script src="/js/admin-dashboard.js"></script>

</body>
</html>
