<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/lesson.css">
  <link rel="stylesheet" href="/css/alert.css">

   <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Jacquarda+Bastarda+9&display=swap" rel="stylesheet"> 

  <title>h1</title>
</head>
<body>
<nav class="navbar">

  <!-- LEFT -->
  <div class="menu" id="menu-btn">
    <img src="/images/Group 119.png" id="menuIcon" class="menu-icon" alt="menu" width="24">
  </div>

  <!-- DROPDOWN -->
  <div class="dropdown" id="dropdownMenu">
    <h3 class="menu-title">HTML Lessons</h3>
    <ul id="lessonList"></ul>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="profile">
      <div class="profile-pic">
        <img id="home-profile-pic" src="/images/default.png" alt="profile">
      </div>
      <div id="home-username" class="profile-name">username</div>
    </div>

    <div class="point">
      <img src="/images/Group 115.png" width="24">
      <span id="point" class="point-span">00</span>
    </div>

    <div class="graph">
      <img src="/images/Group 116.png" width="24">
    </div>

    <div class="notifications">
      <img src="/images/notifi.png" width="24">
    </div>

  </div>

</nav>
<div class="header">
<h2 id="lesson-title"></h2>
<p id ="lesson-desc"></p>
  </div>

  <div class="containers">
    <div id="lessonCode" class="container1">
      <div id="lesson-top"></div>
      <div id="lesson-middle"></div>
        <div id="lesson-bottom"></div>
      
       

    </div>
    <div class="container2" >
      <nav class="tryme-navbar">
        <div class="left">
          TRY ME!
        </div>
      <div class="right">
        <button class="run-button" onclick="runCode()">
          Run
        </button>
      </div>
      </nav>
    <textarea class="editor" id="editor"></textarea> 
    <iframe id="output" class="output" style="display:none;"></iframe>

    </div>
  </div>
  <div class="right-buttons">
    <div class="button-wrapper">
      <img src="/images/Group 96 (1).png"class="prev">
      <button onclick="prevLesson()">PREV</button>
    </div>
    <div class="button-wrapper">
      <img src="/images/Group 96 (1).png" class="next">
      <button id="nextBtn" onclick="nextLesson()" >NEXT</button>
    </div>
  </div>


    <script src="/js/htmllesson.js"></script>
  </body>
</html>
