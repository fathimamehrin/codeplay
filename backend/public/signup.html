<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/signup.css">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<title>Signup</title>
</head>
<body>

<form id="form">
    <div class="accountbox">
        <div class="contents">
            <h1>CREATE AN ACCOUNT</h1>

            <div class="input-box">
                <input type="text" id="name" placeholder="USERNAME"><br>
                <span id="userError" class="error"></span><br>

                <input type="text" id="email" placeholder="EMAIL"><br>
                <span id="emailError" class="error"></span><br>

                <input type="password" id="pass" placeholder="PASSWORD"><br>
                <span id="passwordError" class="error"></span><br>

                <input type="password" id="cpass" placeholder="CONFIRM PASSWORD"><br>
                <span id="cpassError" class="error"></span><br>
            </div>

            <button type="submit"  class="submit">SUBMIT</button>
            <p id="serverError" class="error"></p>
        </div>
    </div>
</form>

<script src="js/signup.js"></script>
</body>
</html>
