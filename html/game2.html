<!DOCTYPE html>
<html>
<head>
  <title>Fix The Website</title>
  <link rel="stylesheet" href="/css/game2.css">
</head>
<body>

<div class="container">

  <h2>🎯 Match the Target Design</h2>

  <div class="layout">

    <!-- TARGET -->
    <div class="box">
      <h3>😍 Target Design</h3>
      <div class="website target" id="target">
        <h1>My Website</h1>
        <p>Clean and modern design</p>
        <button class="targetbutton">Click Me</button>
      </div>
    </div>

    <!-- PLAYER -->
    <div class="box">
      <h3>🎨 Your Website</h3>
      <div class="website player" id="player">
        <h1>My Website</h1>
        <p>Fix me!</p>
        <button>Click Me</button>
      </div>
    </div>

    <!-- CHECKLIST -->
    <div class="box">
      <h3>✅ Checklist</h3>
      <ul id="checklist">
        <li data-prop="textAlign">⬜ Center the text</li>
        <li data-prop="backgroundColor">⬜ Light blue background</li>
        <li data-prop="borderTopWidth">⬜ 3px solid border</li>
        <li data-prop="borderRadius">⬜ Rounded corners</li>
        <li data-prop="paddingTop">⬜ Add padding</li>
      </ul>
    </div>

  </div>

  <textarea id="cssInput" placeholder="Write CSS for .player here..."></textarea>
  <div id="celebration">
  <div class="popup">
    🎉 Level Complete! 🎉
  </div>
</div>
</div>

<script src="/js/game2.js"></script>
</body>
</html>
